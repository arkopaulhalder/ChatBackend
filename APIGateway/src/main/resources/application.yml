# API-Gateway
server:
  port: 8080

spring:

  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        #=================AUTH SERVICE=================
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

          filters:
            - JwtAuthenticationFilter

            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@authRateLimiter}"

        #=================USER SERVICE=================
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
          filters:
            - JwtAuthenticationFilter

        #=================CHAT SERVICE=================
        - id: chat-service

          uri: lb://chat-service

          predicates:
            - Path=/chat/**, /ws/**

          filters:
            - JwtAuthenticationFilter

        #=================PRESENCE SERVICE=================
        - id: presence-service

          uri: lb://presence-service

          predicates:
            - Path=/presence/**

          filters:
            - JwtAuthenticationFilter

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:secret}
      timeout: 2000ms
      connect-timeout: 2000ms

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET_KEY:VGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGRvY2VhaSB0aGF0IGlzIGV4YWN0bHkgNjQgYnl0ZXMgbG9uZw==}
  expiration: 86400000
  access-token-expiry-ms: 900000
  refresh-token-expiry-days: 30

logging:
  level:
    org.springframework.cloud.gateway: DEBUG