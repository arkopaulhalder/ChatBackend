server:
  port: 8085

spring:
  application:
    name: presence-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:secret}
      # Enable keyspace notifications so we can detect key expiry (user goes offline)
      # This must also be enabled on the Redis server itself — see KeyspaceNotificationConfig

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

presence:
  ttl-seconds: 60   # how long before a user is considered offline without a heartbeat

logging:
  level:
    com.ChatSystem.presence_service: DEBUG
